name: CI

on: [push, pull_request]

jobs:
  norminette:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install norminette
        run: |
          python -m pip install --upgrade pip
          pip install norminette

      - name: Run Norminette
        run: norminette $(find . -name "*.c" -o -name "*.h" | grep -v "libft/")

  build:
    runs-on: ubuntu-latest
    needs: norminette

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build
        run: make